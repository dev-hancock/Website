pool: 'Default'

workspace:
  clean: all

steps:
- task: UseDotNet@2
  inputs:
    packageType: 'sdk'
    version: '8.x'
    installationPath: $(Agent.ToolsDirectory)/dotnet
  displayName: 'Install'

- task: DotNetCoreCLI@2
  inputs:
    command: 'restore'
    projects: '**/*.sln'
  displayName: 'Restore'

- task: DotNetCoreCLI@2
  inputs:
    command: 'build'
    arguments: '-c Release -o $(Build.BinariesDirectory)/build --no-restore'
    projects: '**/*.sln'
  displayName: 'Build'

- task: DotNetCoreCLI@2
  inputs:
    command: 'test'
    arguments: '-c Release -o $(Build.BinariesDirectory)/build --no-build'
    projects: '**/*.sln'
  displayName: 'Test'

- task: DotNetCoreCLI@2
  inputs:
    command: 'publish'
    arguments: '-c Release -o $(Build.ArtifactStagingDirectory)/publish --no-build'
    projects: '**/*.Website.csproj'
  displayName: 'Publish'

- task: AzureWebApp@1
  inputs:
    azureSubscription: 'AzureServiceConnection'
    appType: 'webAppLinux'
    appName: 'dev-hancock'
    package: '$(Build.ArtifactStagingDirectory)/publish/*.zip'
    deploymentMethod: 'auto'
  displayName: 'Deploy'
